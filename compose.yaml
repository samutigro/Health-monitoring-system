services:
  backend:
    build:
      context: ./backend
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    environment:
      API_KEY: demo-secret-key
      DATABASE_URL: postgresql+psycopg://health_monitoring:health_monitoring@postgres:5432/health_monitoring

  postgres:
    image: postgres:17.10-alpine
    environment:
      POSTGRES_DB: health_monitoring
      POSTGRES_USER: health_monitoring
      POSTGRES_PASSWORD: health_monitoring
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U health_monitoring -d health_monitoring"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  swagger-ui:
    image: swaggerapi/swagger-ui:v5.17.14
    ports:
      - "8080:8080"
    environment:
      SWAGGER_JSON: /openapi/openapi.yaml
    volumes:
      - ./openapi:/openapi:ro

  redoc:
    image: redocly/redoc:v2.2.0
    ports:
      - "8081:80"
    environment:
      SPEC_URL: openapi.yaml
    volumes:
      - ./openapi/openapi.yaml:/usr/share/nginx/html/openapi.yaml:ro

  prism:
    image: stoplight/prism:4
    command: mock -h 0.0.0.0 /openapi/openapi.yaml
    ports:
      - "4010:4010"
    volumes:
      - ./openapi:/openapi:ro

volumes:
  postgres-data:
