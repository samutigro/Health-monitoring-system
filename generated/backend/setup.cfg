[metadata]
name = health_monitoring_api
version = 1.0.0
description = This OpenAPI Description defines a small health monitoring API used in a university project to demonstrate a contract-first workflow.  The API manages patient profiles and stores two biometric signals:  - heart rate batches, sent as 60 seconds of data at 10 Hz - body temperature, sent as one average value per minute  The contract is intentionally simple but complete enough to demonstrate schemas, parameters, request bodies, responses, reusable components, examples, security requirements, documentation, mocking, SDK generation, backend implementation and contract testing. 
long_description = file: README.md
keywords = OpenAPI Health Monitoring API
python_requires = >= 3.7.*
classifiers =
    Operating System :: OS Independent
    Programming Language :: Python :: 3
    Programming Language :: Python :: 3.7

[options]
install_requires = fastapi[all]
setup_requires = setuptools
package_dir = =src
packages = find_namespace:

[options.packages.find]
where = src
